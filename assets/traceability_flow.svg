<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="360" viewBox="0 0 1180 360" role="img" aria-labelledby="title desc">
  <title id="title">Algorithm-to-FPGA traceability flow</title>
  <desc id="desc">A simplified public traceability flow from training to public evidence.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1180" height="360" rx="24" fill="#ffffff"/>
  <text x="52" y="58" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="700" fill="#0f172a">Algorithm-to-FPGA Traceability</text>
  <text x="52" y="88" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#475569">Public view: the same deployment state is followed across training, export, runtime, RTL, and results.</text>

  <g transform="translate(60 148)">
    <rect width="150" height="86" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
    <text x="26" y="38" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#0f172a">Training</text>
    <text x="26" y="62" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#475569">StrictQAT</text>
  </g>

  <g transform="translate(265 148)">
    <rect width="150" height="86" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
    <text x="26" y="38" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#0f172a">Export</text>
    <text x="26" y="62" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#475569">FPGA assets</text>
  </g>

  <g transform="translate(470 94)">
    <rect width="170" height="86" rx="14" fill="#ecfeff" stroke="#a5f3fc" stroke-width="2"/>
    <text x="28" y="38" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#0f172a">Runtime</text>
    <text x="28" y="62" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#475569">API boundary</text>
  </g>

  <g transform="translate(470 218)">
    <rect width="170" height="86" rx="14" fill="#fef3c7" stroke="#fde68a" stroke-width="2"/>
    <text x="28" y="38" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#0f172a">RTL</text>
    <text x="28" y="62" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#475569">Closure</text>
  </g>

  <g transform="translate(700 148)">
    <rect width="170" height="86" rx="14" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="2"/>
    <text x="28" y="38" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#0f172a">Evidence</text>
    <text x="28" y="62" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#475569">43/43 checks</text>
  </g>

  <g transform="translate(930 148)">
    <rect width="170" height="86" rx="14" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
    <text x="28" y="38" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#0f172a">Showcase</text>
    <text x="28" y="62" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#475569">Depth results</text>
  </g>

  <path d="M210 191 H258" fill="none" stroke="#475569" stroke-width="2.3" marker-end="url(#arrow)"/>
  <path d="M415 191 C440 174,450 146,464 137" fill="none" stroke="#475569" stroke-width="2.3" marker-end="url(#arrow)"/>
  <path d="M415 191 C440 211,450 244,464 260" fill="none" stroke="#475569" stroke-width="2.3" marker-end="url(#arrow)"/>
  <path d="M640 137 C670 146,682 168,694 186" fill="none" stroke="#475569" stroke-width="2.3" marker-end="url(#arrow)"/>
  <path d="M640 260 C670 250,682 219,694 198" fill="none" stroke="#475569" stroke-width="2.3" marker-end="url(#arrow)"/>
  <path d="M870 191 H923" fill="none" stroke="#475569" stroke-width="2.3" marker-end="url(#arrow)"/>

  <text x="52" y="324" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#64748b">Implementation details remain private during paper review; this diagram only states the public evidence boundary.</text>
</svg>
