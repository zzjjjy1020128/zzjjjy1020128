<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="380" viewBox="0 0 1180 380" role="img" aria-labelledby="title desc">
  <title id="title">FOU-centered Stereo-ToF FPGA system overview</title>
  <desc id="desc">A simplified public overview of the Stereo-ToF FPGA deployment path.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#334155"/>
    </marker>
    <linearGradient id="out" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.55" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
  </defs>

  <rect width="1180" height="380" rx="24" fill="#f8fafc"/>
  <text x="52" y="58" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="700" fill="#0f172a">Stereo-ToF FPGA Deployment Path</text>
  <text x="52" y="88" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#475569">A compact public view of the end-to-end system boundary.</text>

  <g transform="translate(70 150)">
    <rect width="170" height="96" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="34" cy="48" r="18" fill="#dbeafe"/>
    <circle cx="52" cy="48" r="18" fill="#ccfbf1"/>
    <text x="82" y="42" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#0f172a">Inputs</text>
    <text x="82" y="66" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#475569">RGB + ToF</text>
  </g>

  <g transform="translate(305 150)">
    <rect width="170" height="96" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="28" y="30" width="40" height="40" rx="8" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2"/>
    <text x="86" y="42" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#0f172a">FOU-STFNet</text>
    <text x="86" y="66" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#475569">Fusion model</text>
  </g>

  <g transform="translate(540 150)">
    <rect width="170" height="96" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="30" y="28" width="36" height="44" rx="7" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="86" y="42" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#0f172a">StrictQAT</text>
    <text x="86" y="66" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#475569">FPGA assets</text>
  </g>

  <g transform="translate(775 150)">
    <rect width="170" height="96" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="29" y="31" width="38" height="38" rx="7" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
    <text x="86" y="42" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#0f172a">FOU-Acc</text>
    <text x="86" y="66" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#475569">FPGA path</text>
  </g>

  <g transform="translate(1010 150)">
    <rect width="120" height="96" rx="14" fill="url(#out)" stroke="#0f766e" stroke-width="2"/>
    <text x="26" y="42" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#ffffff">Depth</text>
    <text x="26" y="66" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#ecfeff">Output</text>
  </g>

  <path d="M240 198 H298" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M475 198 H533" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M710 198 H768" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M945 198 H1003" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>

  <g transform="translate(260 292)">
    <rect width="660" height="44" rx="22" fill="#ecfeff" stroke="#67e8f9"/>
    <text x="36" y="28" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" fill="#155e75">160x160 @ 250 FPS | 31.08 mm MAE | 43-layer RTL-visible closure</text>
  </g>
</svg>
