<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="360" viewBox="0 0 1180 360" role="img" aria-labelledby="title desc">
  <title id="title">Algorithm-to-FPGA traceability flow</title>
  <desc id="desc">A simplified public traceability flow from training to public evidence.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1180" height="360" rx="24" fill="#ffffff"/>
  <text x="56" y="58" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="700" fill="#0f172a">Algorithm-to-FPGA Traceability</text>
  <text x="56" y="92" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#475569">The same deployment state is followed across training, export, runtime, RTL verification, and public evidence.</text>

  <g transform="translate(70 162)">
    <rect width="145" height="84" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
    <text x="24" y="36" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#0f172a">Training</text>
    <text x="24" y="60" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#475569">StrictQAT</text>
  </g>

  <g transform="translate(255 162)">
    <rect width="145" height="84" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
    <text x="24" y="36" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#0f172a">Export</text>
    <text x="24" y="60" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#475569">Assets</text>
  </g>

  <g transform="translate(440 162)">
    <rect width="145" height="84" rx="14" fill="#ecfeff" stroke="#a5f3fc" stroke-width="2"/>
    <text x="24" y="36" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#0f172a">Runtime</text>
    <text x="24" y="60" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#475569">API</text>
  </g>

  <g transform="translate(625 162)">
    <rect width="145" height="84" rx="14" fill="#fef3c7" stroke="#fde68a" stroke-width="2"/>
    <text x="24" y="36" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#0f172a">RTL</text>
    <text x="24" y="60" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#475569">Closure</text>
  </g>

  <g transform="translate(810 162)">
    <rect width="145" height="84" rx="14" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="2"/>
    <text x="24" y="36" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#0f172a">Evidence</text>
    <text x="24" y="60" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#475569">43/43 checks</text>
  </g>

  <g transform="translate(995 162)">
    <rect width="120" height="84" rx="14" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
    <text x="22" y="36" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#0f172a">Results</text>
    <text x="22" y="60" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#475569">Depth</text>
  </g>

  <path d="M215 204 H248" fill="none" stroke="#475569" stroke-width="2.3" marker-end="url(#arrow)"/>
  <path d="M400 204 H433" fill="none" stroke="#475569" stroke-width="2.3" marker-end="url(#arrow)"/>
  <path d="M585 204 H618" fill="none" stroke="#475569" stroke-width="2.3" marker-end="url(#arrow)"/>
  <path d="M770 204 H803" fill="none" stroke="#475569" stroke-width="2.3" marker-end="url(#arrow)"/>
  <path d="M955 204 H988" fill="none" stroke="#475569" stroke-width="2.3" marker-end="url(#arrow)"/>

  <text x="56" y="318" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#64748b">Implementation details remain private during paper review; this diagram only states the public evidence boundary.</text>
</svg>
